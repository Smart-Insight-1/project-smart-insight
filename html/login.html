 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
 </head>
 <body>
    <div class="login">
  
        <div class="container">
            <div class="card-login">
                <h2>Login</h2>
                <div class="formulario">
                     <div class="campo">
                        <span>CNPJ:</span>
                        <input id="cnpj_input" type="password" placeholder="***********">
                    </div>
                    <div class="campo">
                        <span>E-mail:</span>
                        <input id="email_input" type="text" placeholder="Login">
                    </div>
                    <div class="campo">
                        <span>Senha:</span>
                        <input id="senha_input" type="password" placeholder="******">
                    </div>
                    <button class="botao" onclick="analisar()">Entrar</button>
                    <div class="msg">
                        Ainda não tem uma conta? <span>Crie uma</span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="div_msg"></div>
 </body>
 </html>
 

    <script>
        function analisar(){
            // variavel senha
            let senha = senha_input.value;
            let tamanhoSenha = senha.length;


            // variavel cnpj
            let cnpj = cnpj_input.value;
            let tamanhoCnpj = cnpj.length;


            //variavel email
            let email = email_input.value;
            //terminar com .com
            let termina_com = email.endsWith('.com');
            //veriicar @
            let indice_arroba = email.indexOf('@');
            //deixar minusculo 
            var frase_minuscula = email.toLowerCase();
           

            if (tamanhoSenha < 8 || tamanhoCnpj < 11) { 
                    div_msg.innerHTML  += `Cnpj/senha INVALIDOS<br>`;
            } else if
            (indice_arroba == -1){
                    div_msg.innerHTML  += `Digite um email valido`;
            }

        }
    </script>
