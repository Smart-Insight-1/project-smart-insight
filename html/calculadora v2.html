<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULADORA V2</title>
<style>
body {
    margin: 0;
    height: 100vh;
}

.central {
    display: flex;
    flex-direction: column;
    gap: 10px; /* controla o espaçamento vertical */
    align-items: center;
}

input {
  width: 100%;
  max-width: 400px;
  padding: 8px;
  font-size: 14px;
  border: 1px solid #ccc;
}
</style>

</head>
<body>

<div class="central">
    <h2>SMART INSIGHT</h2>
    <h3>CALCULADORA</h3>

    <button onclick="comoUtilizar()">No que nos baseamos para o calculo</button>
    
    <input type="number" id="iptFaturamento" placeholder="Digite seu faturamento mensal (R$)">
    
    <input type="number" id="iptConversaoVendas" placeholder="Taxa de conversão de vendas atual (%)">
    
    <input type="number" id="iptPerdaPorEstoque" placeholder="Taxa estimada de perda por falta de estoque (%)">
    
    <input type="number" id="iptProdutoFraco" placeholder="Taxa estimada de produtos com baixa conversão em venda (%)">
    
    <input type="number" id="iptAltoInteresseBaixaVenda" placeholder="Taxa estimada de produtos com alto interesse e baixa venda(%)">
    
    <button onclick="analisar()">Analisar</button>
    <div id="divMensagem"></div>
    
    
</body>
</html>
<script>

    /*https://www.agppesquisas.com.br/noticias/ruptura-de-estoque-no-varejo/

https://negociosdebeleza.beautyfair.com.br/varejo/o-papel-da-perfumaria-na-jornada-multicanal-dados-sortimento-e-promocoes-que-realmente-vendem/ Segundo a Scanntech, 60% das promoções não geram aumento de vendas, geralmente por falta de análise prévia do comportamento do shopper ou objetivo definido.

https://mercadoeconsumo.com.br/05/09/2023/artigos/ruptura-no-pdv-como-a-ia-pode-ajudar-a-combater-esse-vilao-do-varejo/ referente a taxa de ruptura 

abradilan.com.br/mercado/brasileiro-reduz-ritmo-de-compras-em-higiene-e-beleza-diz-estudo/ redução de vendas no setor
 */


    let upMerchandising=35
    /* A partir do reposicionamento estratégico de produtos
    nós podemos ter uma ampliação no faturamento dos produtos analisados em algo proximo de 20%
    você identifica os produtos com baixa interação e/ou conversão e reposiciona eles na loja
    
    O produto passa a ser visto
    aumenta interação
    aumenta chance de compra
    
    produto invisível não vende
    maior visibilidade = venda
    
    Produtos com alto interesse e baixa venda
    produto sendo testado mas não vendido
    
    O que você faz:
    ajusta:
    preço/comunicação/posição no mercado
    cliente quer comprar, mas algo impede. Resolve isso a partir da analise dos dados */

    let upFaltaEstoque=10
    /* Baseado na ideia do Kanban/Toyotismo de demanda baseada em interesse
    aumento de interação e vendas = aumento de demanda futura
    
    O que você faz:
    antecipa reposição
    evita produto acabar e consequentemente perder vendas por falta de estoque

    Oferta que acompanha a demanda */

    function comoUtilizar(){
        alert("Nossa solução atua em quatro pontos principais do faturamento:\n \nMelhora do merchandising ao reposicionar produtos pouco vistos.\n \nAumento da conversão ao corrigir produtos que não convertem.\n \nEvitamos perdas por falta de estoque ao antecipar a demanda com base no comportamento do cliente.\n \nRecuperamos produtos parados ao dar visibilidade estratégica a itens ignorados.")
    }

    function analisar(){
        let faturamento= Number(iptFaturamento.value)
        let conversao= Number(iptConversaoVendas.value)
        let perdaPorEstoque= Number(iptPerdaPorEstoque.value)
        let produtoFraco= Number(iptProdutoFraco.value)

        let porcentagemGeral= conversao+perdaPorEstoque+produtoFraco
        let estimativaReal= porcentagemGeral/2
        let upFaturamento= (faturamento*estimativaReal)/100

        divMensagem.innerHTML=`Com base nos dados inseridos, existe um potencial de aumento na taxa de conversão de vendas em até +${estimativaReal}%.<br>Isso representa uma estimativa de aumento no faturamento de R$${faturamento} para R$${faturamento+upFaturamento}`
    }
</script>
