<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="cadastro">

        <div class="container-cadastro">
            <div class="card-cadastro">

                <h2 class="tituloCadastro">Cadastro</h2>

                <div class="formulario">
                    <div class="nomes">

                        <div class="campo">
                            Nome Completo
                            <input type="text" id="iptNomeCompleto">
                        </div>

                        <div class="campo">
                            Nome da loja
                            <input type="text" id="iptNomeDaMarca">
                        </div>
                    </div>
                    <div class="email">

                        <div class="campo">
                            Email
                            <input type="text" id="iptEmail">
                        </div>

                        <div class="cep-numero">
                            <div class="campo">
                                CEP
                                <input type="text" id="iptCep">
                            </div>



                            <div class="campo">
                                Número
                                <input type="text" id="iptNumero">
                            </div>
                            
                        </div>

                    </div>

                    <div class="senha">
                        <div class="campo">
                            CNPJ
                            <input type="text" id="iptCnpj">
                        </div>

                        <div class="campo">
                            Senha
                            <input type="text" id="iptSenha">
                        </div>

                    </div>

                    <div class="confirmarsenha">

                        <div class="campo">
                            Telefone
                            <input type="text" id="iptTelefone">
                        </div>

                        <div class="campo">
                            Confirmar senha
                            <input type="text" id="iptConfirmarSenha">
                        </div>

                    </div>

                    <div class="botaoCadastro">
                        <button onclick="criarConta()">Criar conta</button>
                    </div>

                    <div class="msg">Já tem uma conta?
                        <a href="">Entre</a>
                    </div>
                </div>

            </div>

        </div>

    </div>
    <div id="msg" class="alerta"></div>
</body>

</html>

<script>
function criarConta() {
    let nome = iptNomeCompleto.value;
    let loja = iptNomeDaMarca.value;
    let email = iptEmail.value;
    let cep = iptCep.value;
    let numero = iptNumero.value;
    let cnpj = iptCnpj.value;
    let senha = iptSenha.value;
    let confirmarSenha = iptConfirmarSenha.value;
    let telefone = iptTelefone.value;

    let div = msg;

    // limpa antes
    div.innerHTML = "";
    div.style.display = "block";
    div.className = "alerta";

    let termina_com = email.endsWith('.com');
    let indice_arroba = email.indexOf('@');

    if (
        nome == "" || loja == "" || email == "" || cep == "" ||
        numero == "" || cnpj == "" || senha == "" ||
        confirmarSenha == "" || telefone == ""
    ) {
        div.classList.add("erro");
        div.innerHTML = "❌ Preencha todos os campos!";
    } 
    else if (senha.length < 8) {
        div.classList.add("erro");
        div.innerHTML = "❌ A senha deve ter pelo menos 8 caracteres!";
    } 
    else if (cnpj.length < 14) {
        div.classList.add("erro");
        div.innerHTML = "❌ CNPJ inválido!";
    } 
    else if (indice_arroba == -1 || !termina_com) {
        div.classList.add("erro");
        div.innerHTML = "❌ Email inválido!";
    } 
    else if (senha != confirmarSenha) {
        div.classList.add("erro");
        div.innerHTML = "❌ As senhas não coincidem!";
    } 
    else {
        div.classList.add("sucesso");
        div.innerHTML = "✅ Conta criada com sucesso!";
    }
}
</script>
