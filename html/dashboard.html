<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
</head>

<body>

<div class="menu">
    <h2>Painel</h2>
    <ul>
        <li>Dashboard</li>
        <li>Produtos</li>
        <li>Informações da Loja</li>
    </ul>
</div>

<div class="dashboard">

    <div class="container-kpi">
        <div class="kpi">KPI 1</div>
        <div class="kpi">KPI 2</div>
        <div class="kpi">KPI 3</div>
    </div>

    <div class="container-graficos">

        <div class="grafico">Gráfico 1</div>
        <div class="grafico">Gráfico 2</div>
        <div class="grafico">Gráfico 3</div>
        <div class="grafico">Gráfico 4</div>

    </div>

</div>

</body>
</html>
<style>
    body{
        margin:0;
        font-family:Arial;
        background:#0C021A;
        display:flex;
    }

    .menu{
        width:15%;
        min-height:100vh;
        background:#14042A;
        padding:20px;
        color:white;
    }

    .menu ul{
        list-style:none;
        padding:0;
    }

    .menu li{
        margin:20px 0;
        cursor:pointer;
    }

    .dashboard{
        width:85%;
        padding:30px;
    }

    .container-kpi{
        display:flex;
        gap:20px;
        margin-bottom:30px;
    }

    .kpi{
        flex:1;
        height:100px;
        background:#1E0A3A;
        border-radius:10px;
    }

    .container-graficos{
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap:15px;
    }

    .grafico{
        height:260px;
        background:#1E0A3A;
        border-radius:10px;
    }
</style>
