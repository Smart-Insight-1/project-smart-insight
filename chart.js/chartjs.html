<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>


<body>
  <div class="graficos">

  <div class="card">
    <canvas id="myChart"></canvas>
  </div>

  <div class="card">
    <canvas id="myChart2"></canvas>
  </div>

  <div class="card">
    <canvas id="myChart3"></canvas>
  </div>

  <div class="card">
    <canvas id="myChart4"></canvas>
  </div>

  <div class="card grande">
    <canvas id="graficoInteracoesHora"></canvas>
  </div>

</div>

</body>



<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Malbec gold', 'Batom Make B.', 'Lily EDP', 'Base Make B.', 'Sérum Botik', 'Protetor Solar'],
      datasets: [{
        label: 'Interações por Produto',
        data: [1650, 1100, 950,880, 420, 150],
        borderWidth: 2,
        backgroundColor: '#ae80ed' ,
        borderColor: '#2F0569'
        
        
      }]
    },
    options: { 
  responsive: true,
  maintainAspectRatio: false
    ,
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });
</script>

<script>
  const ctx_02 = document.getElementById('myChart2');

  new Chart(ctx_02, {
    type: 'bar',
    data: {
      labels: ['Perfumaria', 'Maquiagem', 'Skincare', 'Corpo/Banho'],
      datasets: [{
        label: 'Interações por Setor',
        data: [4430, 2600, 800,310],
         borderWidth: 2,
        backgroundColor: '#ae80ed' ,
        borderColor: '#2F0569'
        
      }]
    },
    options: { 
  responsive: true,
  maintainAspectRatio: false,

      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });
</script>







<script>
    const ctxHora = document.getElementById('graficoInteracoesHora');

    new Chart(ctxHora, {
        type: 'line',
        data: {
            labels: ['10:00', '12:00', '14:00', '16:00', '18:00', '20:00'],
            datasets: [
                { 
        
                    label: 'Total da Loja',
                    data: [230, 830, 350, 610, 1290, 670],
                    borderColor: '#ae80ed' ,
                    borderDash: [5, 5],
                    borderWidth: 3
                },
                {
                    label: 'Malbec Gold',
                    data: [150, 600, 200, 300, 800, 450],
                    borderColor: '#2F0569',
                    borderWidth: 2
                },
                {
                    label: 'Base Make B.',
                    data: [50, 150, 100, 250, 400, 200],
                    borderColor: '#5d62e3',
                    borderWidth: 2
                },
                {
                    label: 'Sérum Botik',
                    data: [30, 80, 50, 60, 90, 20],
                    borderColor: '#cd5de3',
                    borderWidth: 2
                }
            ]
        },
        options: {
            plugins: {
                legend: {
                    display: true,
                    position: 'top', // Garante que a legenda fique acima do gráfico
                    labels: {
                        usePointStyle: true, // Deixa a legenda com formato de bolinha em vez de quadrado (opcional, fica mais bonito)
                        padding: 20
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    max: 1500
                }
            }
        }
    });
</script>


















<script>
const ctx_03 = document.getElementById('myChart3');

new Chart(ctx_03, {
  type: 'bar',
  data: {
    labels:['10h','12h','14h','16h','18h','20h'],
    datasets: [
      {
        label: 'Interações Malbec Gold',
        data: [4430, 2600, 800, 310, 200, 150]
      },
      {

      },
      {
        label: 'Interações Sérum Botik',

      },
      {
        label: 'Total',

      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    scales: {
      y: {
        beginAtZero: true
      }
    }
  }
});
</script>

</html>
