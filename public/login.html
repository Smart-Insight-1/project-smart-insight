<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | Smart Insight</title>
    <link rel="stylesheet" href="css/headerFooter.css">
    <link rel="stylesheet" href="css/loginCadastro.css">
    <script src="https://kit.fontawesome.com/d840916580.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="header">
        <div class="logo">
            <img src="assets/logo.png" alt="Logo">
        </div>
        <div class="container-navbar">
            <div class="navbar">
                <a href="home.html">Home</a>
                <a href="home.html">Quem somos</a>
                <a href="calculadora.html">Calculadora</a>
                <a href="home.html">Contato</a>
            </div>
            <div class="user">
                <a href="login.html"><i class="fa-regular fa-user"></i></a>
            </div>
        </div>
    </div>
    <div class="login">

        <div class="container">
            <div class="card-login">
                <h2>Login</h2>
                <div class="formulario">
                    <div class="campo">
                        <span>CNPJ:</span>
                        <input id="cnpj_input" type="password" placeholder="***********">
                    </div>
                    <div class="campo">
                        <span>E-mail:</span>
                        <input id="email_input" type="text" placeholder="Login">
                    </div>
                    <div class="campo">
                        <span>Senha:</span>
                        <input id="senha_input" type="password" placeholder="******">
                    </div>
                    <button class="botao" onclick="analisar()">Entrar</button>
                    <div class="msg">
                        <a href="cadastro.html">Ainda não tem uma conta? <span>Crie uma</span></a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="div_msg" class="alerta"></div>
    <footer class="footer">
        <div class="footer-logo">
            <img src="assets/logo.png" alt="Logo">
        </div>
        <div class="footer-text">
            <p>© Smart Insight</p>
            <p>2026</p>
        </div>
        <div class="footer-social">
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
        </div>
    </footer>
</body>

</html>




<script>
    function analisar() {
        let senha = senha_input.value;
        let cnpj = cnpj_input.value;
        let email = email_input.value;

        let div = div_msg;

        // limpa antes
        div.innerHTML = "";
        div.style.display = "block";
        div.className = "alerta";

        let termina_com = email.endsWith('.com');
        let indice_arroba = email.indexOf('@');

        if (senha.length < 8 || cnpj.length < 11) {
            div.classList.add("erro");
            div.innerHTML = "❌ CNPJ ou senha inválidos!";
        }
        else if (indice_arroba == -1 || !termina_com) {
            div.classList.add("erro");
            div.innerHTML = "❌ Email inválido!";
        }
        else {
            div.classList.add("sucesso");
            div.innerHTML = "✅ Login válido!";
        }
    }
</script>
