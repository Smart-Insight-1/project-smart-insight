</head>

<body>

                <a href="login.html"><i class="fa-regular fa-user"></i></a>

    <div class="calculadora-container">
        <div class="central">
            <h2>SMART INSIGHT</h2>
            <h3>CALCULADORA</h3>

            <button onclick="comoUtilizar()">No que nos baseamos para o cálculo</button>

            <input type="number" id="iptInteracoes" placeholder="Média de interações por produto">

            <input type="number" id="iptTempoMedio" placeholder="Tempo médio de retenção (segundos)">

            <button onclick="analisar()">Analisar</button>

<script>
    /*Relatórios recentes de 2026 mostram que o varejo está migrando de métricas de venda para métricas de comportamento, como interação com produtos e tempo de permanência. Nosso sistema atua exatamente nessa camada, permitindo otimizar a experiência no ponto de venda com base em dados reais de engajamento.
   
   https://www.gopazo.com/blog/retail-shelf-strategy?
   SHELF STRATEGY= Estrategia de prateleira
    Um produto forte por si só não garante vendas no varejo. Os clientes não compram o que não vêem, e raramente buscam além do que lhes é apresentado primeiro. É por isso que as marcas de alta performance se concentram não apenas na distribuição, mas também em como seus produtos estão posicionados dentro da loja. Essa abordagem é chamada estratégia de prateleira de varejo.
   
   Estratégia de prateleira de varejo é o método de organizar os produtos nas prateleiras de uma forma que maximiza a visibilidade, melhora a velocidade de decisão do comprador e aumenta a receita por loja. É uma ciência que combina colocação de produtos, psicologia do comprador e fluxo de categoria para direcionar vendas mais altas.
   
   Pesquisas mostram que até 60% das decisões de compra são tomadas na loja, e os produtos colocados ao nível dos olhos podem vender até 20 a 25% mais do que aqueles colocados em prateleiras mais baixas. Isso significa que uma estratégia de prateleira ruim pode reduzir silenciosamente a receita, mesmo quando a demanda pelo produto é forte.
   
   
   
   https://www.deloitte.com/us/en/insights/industry/retail-distribution/retail-distribution-industry-outlook.
   Um novo mandato para 2026
   No próximo ano, os fundamentos que há muito ancoram o varejo, como foco no cliente, disciplina financeira, excelência operacional e insight orientado por dados, permanecerão vitais, mas este ano testarão a adaptabilidade do retail’ de novas maneiras.
   
   
    https://www.retailsensing.com/people-counting/retail-dwell-time-metric/#:~:text=Retail%20Sensing%20May%207,%202024,in%20dwell%20time%20and%20sales.
   
    DWELL TIME= Tempo de permanencia/Retenção
   Um estudo da Pathintelligence mostrou que “existe uma relação significativa e positiva entre tempo de permanência e vendas“. Eles descobriram que um aumento de 1% no tempo de permanência resultou em um aumento de 1,3% nas vendas.
    */



    function comoUtilizar() {
        alert("Nossa calculadora utiliza métricas de comportamento do consumidor (interações e tempo de retenção) e simula ganhos baseados em estudos recentes de mercado, que indicam aumentos em interação e retenção ao melhorar a experiência no ponto de venda. \n Preencha os campos conforme indicado e veja o real potencial do seu comercio!")
    }

    function analisar() {
        let interacoes = Number(iptInteracoes.value)
        let tempoMedio = Number(iptTempoMedio.value)
        let upInteracoes = interacoes * 1.25
        let upTempoRetencao = tempoMedio * 1.20

        if (interacoes <= 0 || tempoMedio <= 0) {
            divMensagem.innerHTML = "Preencha todos os campos corretamente."
        } else {
            divMensagem.innerHTML = `A partir dos dados coletados e tratados pela Smart Insight, se torna viavel um aumento no  potencial das interações em 25% e do tempo médio de permanencia no PDV em até 20% a partir de estratégias de trade marketing. <br> <br>

            <b>ANTES:</b> <br>
            Média de interações: ${interacoes} <br>
            Tempo médio de retenção em loja: ${tempoMedio} segundos <br> <br>

            <b>DEPOIS:</b> <br>
            Média de interações: ${upInteracoes.toFixed(0)} <br>
            Tempo médio de retenção em loja: ${upTempoRetencao.toFixed(1)} segundos <br>`
        }
    }

    function naoPossuoDados() {
        divMensagem.innerHTML = ` Utilizando a Smart Insight, se torna possivel a correção desse ponto cego no PDV e tambem de um aumento no  potencial das interações em 25% e do tempo médio de permanencia no PDV em até 20% a partir de estratégias de trade marketing.<br> <br>`

    }
</script>
